# ==============================================================================
# Orchestrator Config — 전체 옵션 레퍼런스
# ==============================================================================
#
# 이 파일은 Orchestrator의 모든 설정 필드를 설명하는 레퍼런스입니다.
# 실제 운영에는 config/orchestrator-live.yaml을 사용하세요.
#
# 구조:
#   backtest:          백테스트 설정
#   orchestrator:      Orchestrator 최상위 설정
#     pods:            Pod(전략 슬롯) 목록 — 최소 1개
#     graduation:      Incubation → Production 졸업 기준
#     retirement:      Pod 퇴출(Retired) 기준
#     turnover_constraint:  리밸런싱 턴오버 제약
#     surveillance:    Market Surveillance (동적 유니버스 관리)
#
# CLI:
#   Backtest: uv run mcbot orchestrate backtest config/orchestrator-example.yaml --report
#   Paper:    uv run mcbot orchestrate paper config/orchestrator-example.yaml -V
#   Live:     uv run mcbot orchestrate live  config/orchestrator-example.yaml -V
# ==============================================================================

# ── 백테스트 설정 ────────────────────────────────────────────
backtest:
  timeframe: "1D"                        # 기본 타임프레임 (Pod별 override 가능)
  start: "2024-01-01"                    # 백테스트 시작일
  end: "2025-12-31"                      # 백테스트 종료일
  capital: 100000.0                      # 초기 자본 (USD)

# ── Orchestrator 설정 ────────────────────────────────────────
orchestrator:

  # ┌─────────────────────────────────────────────────────────┐
  # │ Allocation — Pod 간 자본 배분                           │
  # └─────────────────────────────────────────────────────────┘
  # 방법: equal_weight | risk_parity | adaptive_kelly | inverse_volatility
  #   equal_weight:        1/N 균등 배분
  #   risk_parity:         리스크 기여도 균등 (상관관계 반영)
  #   adaptive_kelly:      적응적 Kelly 비율 (실적 기반)
  #   inverse_volatility:  변동성 역비례 배분
  allocation_method: risk_parity

  kelly_fraction: 0.25                   # Kelly 스케일링 (0 < x ≤ 1, adaptive_kelly 시 사용)
  kelly_confidence_ramp: 180             # Kelly 신뢰도 램프업 기간 (일, ≥1)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Rebalance — Pod 비중 재조정 트리거                      │
  # └─────────────────────────────────────────────────────────┘
  # 트리거: calendar | threshold | hybrid
  #   calendar:   N일 간격 정기 리밸런싱
  #   threshold:  가중치 이탈 시 리밸런싱
  #   hybrid:     calendar + threshold 조합 (둘 중 먼저 발생)
  rebalance_trigger: hybrid
  rebalance_calendar_days: 7             # 정기 리밸런싱 주기 (일, ≥1)
  rebalance_drift_threshold: 0.10        # 가중치 이탈 임계값 (0 < x ≤ 1)
  min_rebalance_turnover: 0.02           # 최소 턴오버 — 이하면 리밸런스 스킵 (≥0)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Portfolio Risk — 포트폴리오 레벨 리스크 제한            │
  # └─────────────────────────────────────────────────────────┘
  max_gross_leverage: 3.0                # 최대 총 레버리지 (1 ≤ x ≤ 20)
  max_portfolio_drawdown: 0.15           # 포트폴리오 최대 낙폭 (0 < x ≤ 1)
  max_portfolio_volatility: 0.20         # 포트폴리오 최대 변동성 (0 < x ≤ 1)
  max_single_pod_risk_pct: 0.40          # 단일 Pod 최대 리스크 비중 (0 < x ≤ 1)
  daily_loss_limit: 0.03                 # 일일 손실 한도 (0 < x ≤ 1)
  cost_bps: 4.0                          # 거래 비용 (basis points, ≥0)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Correlation — Pod 간 상관관계 모니터링                  │
  # └─────────────────────────────────────────────────────────┘
  correlation_lookback: 90               # 상관계수 계산 lookback (일, ≥5)
  correlation_stress_threshold: 0.70     # 스트레스 상관계수 임계값 (0 ≤ x ≤ 1)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Risk Defense — 리스크 방어 복원 설정                    │
  # └─────────────────────────────────────────────────────────┘
  risk_recovery_steps: 3                 # 리스크 방어 해제 후 자본 복원 단계 수 (1 ≤ x ≤ 10)
  netting_offset_warning_threshold: 0.5  # 넷팅 상쇄 비율 경고 임계값 (0 ≤ x ≤ 1)
  risk_defense_bypass_turnover: true     # Risk defense 발동 시 turnover 제약 우회 여부

  # ┌─────────────────────────────────────────────────────────┐
  # │ Turnover Constraint — 리밸런싱 턴오버 제약              │
  # │ (생략 시 제약 없음)                                     │
  # └─────────────────────────────────────────────────────────┘
  turnover_constraint:
    max_pod_turnover_per_rebalance: 0.10   # Pod당 최대 변동폭 ± (0 < x ≤ 1)
    max_total_turnover_per_rebalance: 0.30 # 전체 최대 턴오버 (0 < x ≤ 2)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Graduation — Incubation → Production 졸업 기준         │
  # └─────────────────────────────────────────────────────────┘
  graduation:
    min_live_days: 30                    # 최소 실운용 일수 (≥1)
    min_sharpe: 0.5                      # 최소 Sharpe 비율 (≥0)
    max_drawdown: 0.20                   # 졸업 시점까지 최대 낙폭 (0 < x ≤ 1)
    min_trade_count: 5                   # 최소 거래 수 (≥1)
    min_calmar: 0.3                      # 최소 Calmar 비율 (≥0)
    max_backtest_live_gap: 0.30          # 백테스트-실거래 성과 괴리 (0 ≤ x ≤ 1)
    max_portfolio_correlation: 0.65      # 기존 포트폴리오와 최대 상관계수 (0 ≤ x ≤ 1)
    max_incubation_days: 90              # INCUBATION 최대 유지 기간 (일, ≥1)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Retirement — Pod 퇴출 기준                              │
  # └─────────────────────────────────────────────────────────┘
  retirement:
    max_drawdown_breach: 0.25            # 즉시 퇴출 낙폭 임계값 (0 < x ≤ 1)
    consecutive_loss_months: 6           # 연속 손실 개월 수 → 즉시 퇴출 (≥1)
    rolling_sharpe_floor: 0.3            # Sharpe < 이 값 → Probation 진입 (≥0)
    probation_days: 30                   # Probation 유예 기간 (일, ≥1)

  # ┌─────────────────────────────────────────────────────────┐
  # │ Surveillance — 동적 유니버스 관리                       │
  # │ (생략 또는 enabled: false 시 비활성)                    │
  # │                                                         │
  # │ 주기적 시장 스캔으로 유동성/거래량 기준 에셋 자동 선별. │
  # │ 새 에셋은 모든 활성 Pod에 추가, 탈락 에셋은             │
  # │ AssetSelector permanently_excluded 처리.                │
  # │ Pod의 symbols는 seed(부팅 보장), surveillance가 확장.   │
  # └─────────────────────────────────────────────────────────┘
  surveillance:
    enabled: true
    scan_interval_hours: 168             # 스캔 주기 (시간, 168 = 7일)
    min_24h_volume_usd: 50000000         # 최소 24h 거래대금 USD (≥0)
    min_listing_age_days: 90             # 최소 상장 기간 (일, ≥0)
    exclude_stablecoins: true            # USDC/USDT, BUSD/USDT 등 제외
    max_assets_per_pod: 10               # Pod당 최대 에셋 수 (≥1)
    max_total_assets: 20                 # 전체 유니버스 최대 에셋 수 (≥1)
    quote_currency: "USDT"               # Quote 통화

  # ┌─────────────────────────────────────────────────────────┐
  # │ Pods — 전략 슬롯 (최소 1개)                             │
  # │                                                         │
  # │ 각 Pod은 독립적인 전략, 에셋, 타임프레임을 가집니다.    │
  # │ MultiTimeframeCandleAggregator가 1m bar에서             │
  # │ 복수 TF bar를 생성하고, Orchestrator가 라우팅합니다.    │
  # │                                                         │
  # │ symbols: Surveillance 비활성 시 = 전체 에셋 목록        │
  # │          Surveillance 활성 시 = seed 심볼 (부팅 보장)   │
  # │ max_assets: Surveillance 에셋 주입 상한 (생략=무제한)   │
  # │                                                         │
  # │ 검증 규칙:                                              │
  # │   - pod_id 중복 금지                                    │
  # │   - initial_fraction 합계 ≤ 1.0                         │
  # │   - min_fraction ≤ initial_fraction ≤ max_fraction      │
  # │   - drawdown_warning < max_drawdown                     │
  # └─────────────────────────────────────────────────────────┘
  pods:
    # ── Pod 1: TSMOM (예시) ──────────────────────────────────
    - pod_id: pod-tsmom
      strategy_name: tsmom                 # Registry 등록 전략 이름
      strategy_params:                     # 전략 생성 파라미터 (전략별 상이)
        lookback: 30
        vol_target: 0.35
        short_mode: 1                      # 0=DISABLED, 1=HEDGE_ONLY, 2=FULL
      symbols:                             # Seed 심볼 (surveillance 활성 시)
        - BTC/USDT                         # 또는 전체 에셋 (surveillance 비활성 시)
        - ETH/USDT
        - SOL/USDT
      timeframe: "1D"                      # Pod 타임프레임 (1D, 12H, 4H 등)
      initial_fraction: 0.40              # 초기 자본 비중 (0 ≤ x ≤ 1)
      max_fraction: 0.50                  # 최대 자본 비중 (0 ≤ x ≤ 1)
      min_fraction: 0.10                  # 최소 자본 비중 (0 ≤ x ≤ 1)
      max_drawdown: 0.15                  # 최대 허용 낙폭 (0 < x ≤ 1)
      drawdown_warning: 0.10              # 낙폭 경고 임계값 (< max_drawdown)
      max_leverage: 2.0                   # 최대 레버리지 (1 ≤ x ≤ 10)
      max_assets: 10                      # Surveillance 에셋 상한 (생략=무제한)
      system_stop_loss: 0.10              # 시스템 손절 비율 (null=비활성)
      use_trailing_stop: true             # 트레일링 스탑 활성화
      trailing_stop_atr_multiplier: 3.0   # 트레일링 스탑 ATR 배수 (1 ≤ x ≤ 10)
      rebalance_threshold: 0.05           # 에셋 리밸런스 이탈 임계값 (0 ≤ x ≤ 1)

      # ── Pod 내 에셋 배분 (생략 시 equal_weight 1/N) ────────
      # 방법: equal_weight | inverse_volatility | risk_parity | signal_weighted
      #   equal_weight:        1/N 균등 배분
      #   inverse_volatility:  변동성 역비례 → 저변동 에셋에 더 많은 비중
      #   risk_parity:         리스크 기여도 균등 (상관관계 반영)
      #   signal_weighted:     전략 시그널 강도에 비례
      asset_allocation:
        method: inverse_volatility
        vol_lookback: 60                  # 변동성 계산 윈도우 (bars, ≥10)
        rebalance_bars: 5                 # N bars마다 에셋 비중 재계산 (≥1)
        min_weight: 0.10                  # 에셋당 최소 비중 (0 ≤ x ≤ 1)
        max_weight: 0.50                  # 에셋당 최대 비중 (≤ max_weight)

      # ── AssetSelector — Pod 내 에셋 동적 선별 FSM ──────────
      # 3+ 에셋 Pod에서 성과 미달 에셋 자동 제외/재진입.
      # 생략 또는 enabled: false 시 비활성.
      #
      # FSM: ACTIVE → UNDERPERFORMING → COOLDOWN → RE_ENTRY → ACTIVE
      # 제외: score < exclude_threshold → confirmation → ramp-down → cooldown
      # 재진입: score > include_threshold → confirmation → ramp-up → active
      #
      # Scoring: sharpe_weight*Sharpe + return_weight*Return + drawdown_weight*DD
      # 가중치 합 = 1.0 필수
      asset_selector:
        enabled: true
        # ── Scoring 가중치 ──
        sharpe_weight: 0.4                # Sharpe 비중 (기본 0.4)
        return_weight: 0.3                # Return 비중 (기본 0.3)
        drawdown_weight: 0.3              # Drawdown 비중 (기본 0.3)
        # ── Lookback ──
        sharpe_lookback: 60               # Sharpe 계산 lookback (bars, ≥10)
        return_lookback: 30               # Return 계산 lookback (bars, ≥5)
        # ── 제외/재진입 임계값 ──
        exclude_score_threshold: 0.20     # 하위 점수 → 제외 후보 (0 ≤ x ≤ 1)
        include_score_threshold: 0.35     # 상위 점수 → 재진입 후보 (> exclude)
        # ── 확인/쿨다운 기간 ──
        exclude_confirmation_bars: 5      # 연속 N bars 확인 후 제외 (≥1)
        include_confirmation_bars: 3      # 연속 N bars 확인 후 재진입 (≥1)
        min_exclusion_bars: 30            # 최소 cooldown 기간 (≥1)
        # ── 전환 ──
        ramp_steps: 3                     # 점진적 비중 전환 단계 (1 ≤ x ≤ 10)
        min_active_assets: 2              # 최소 활성 에셋 수 (≥1)
        # ── Hard exclusion (선택) ──
        hard_exclude_sharpe: -1.0         # 이 Sharpe 이하 → 확인 없이 즉시 제외
        hard_exclude_drawdown: 0.15       # 이 drawdown 이상 → 확인 없이 즉시 제외
        # ── 절대 기준 (null=비활성) ──
        # absolute_min_sharpe: -0.5       # 절대 Sharpe 하한
        # absolute_max_drawdown: 0.30     # 절대 최대 drawdown
        # ── Cooldown 반복 제한 (null=비활성) ──
        # max_cooldown_cycles: 3          # N회 cooldown 반복 → 영구 제외

    # ── Pod 2: Donchian (예시) ───────────────────────────────
    - pod_id: pod-donchian
      strategy_name: donchian-ensemble
      strategy_params:
        lookbacks: [20, 60, 150]
      symbols:
        - BTC/USDT
        - ETH/USDT
        - BNB/USDT
      initial_fraction: 0.30
      max_fraction: 0.50
      asset_allocation:
        method: risk_parity
        vol_lookback: 60
        rebalance_bars: 5
        min_weight: 0.10
        max_weight: 0.50

    # ── Pod 3: Anchor-Mom (예시) ─────────────────────────────
    - pod_id: pod-anchor
      strategy_name: anchor-mom
      strategy_params:
        nearness_lookback: 60
        mom_lookback: 30
      symbols:
        - DOGE/USDT
        - LINK/USDT
        - AVAX/USDT
      initial_fraction: 0.30
      max_fraction: 0.50
      max_drawdown: 0.20
      # asset_allocation 생략 → equal_weight (1/N)
      # asset_selector 생략 → 비활성 (3 에셋 이하는 EW 충분)
