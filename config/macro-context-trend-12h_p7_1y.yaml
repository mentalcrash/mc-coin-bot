# Macro-Context-Trend 12H — P7 EDA Parity 검증 (1년)
# DOGE/USDT 12H, 2025-01-01 ~ 2026-01-01

backtest:
  symbols:
    - DOGE/USDT
  timeframe: "12H"
  start: "2025-01-01"
  end: "2026-01-01"
  capital: 100000.0

strategy:
  name: macro-context-trend-12h
  params:
    ema_fast: 12
    ema_slow: 26
    trend_confirm_bars: 2
    macro_risk_weight: 0.5
    macro_window: 30
    macro_min_weight: 0.3
    macro_max_weight: 1.0
    vol_target: 0.35
    vol_window: 30
    min_volatility: 0.05
    annualization_factor: 730.0
    atr_period: 14
    short_mode: 1            # ShortMode.HEDGE_ONLY
    hedge_threshold: -0.07
    hedge_strength_ratio: 0.8

portfolio:
  max_leverage_cap: 2.0
  rebalance_threshold: 0.10
  system_stop_loss: 0.10
  use_trailing_stop: true
  trailing_stop_atr_multiplier: 3.0
  use_intrabar_trailing_stop: false
  cost_model:
    maker_fee: 0.0002
    taker_fee: 0.0004
    slippage: 0.0005
    funding_rate_8h: 0.0001
    market_impact: 0.0002
