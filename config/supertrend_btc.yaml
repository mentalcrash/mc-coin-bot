# SuperTrend Strategy - BTC 단일 백테스트
# ATR 기반 동적 추세추종, Long-only
# 초록(상승추세) → 진입, 빨강(하락추세) → 청산

backtest:
  symbols:
    - BTC/USDT
  timeframe: "1D"
  start: "2020-01-01"
  end: "2025-12-31"
  capital: 100000.0

strategy:
  name: supertrend
  params:
    atr_period: 10
    multiplier: 3.0
    adx_period: 14
    adx_threshold: 25
    risk_per_trade: 0.01
    atr_stop_multiplier: 2.0

portfolio:
  max_leverage_cap: 1.0
  rebalance_threshold: 0.05
  system_stop_loss: null
  use_trailing_stop: false
  trailing_stop_atr_multiplier: 3.0
  cost_model:
    maker_fee: 0.0004
    taker_fee: 0.0004
    slippage: 0.0005
    funding_rate_8h: 0.0
    market_impact: 0.0
