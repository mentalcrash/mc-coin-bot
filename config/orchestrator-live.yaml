# ==============================================================================
# Orchestrator Live Config — 4 Pods (Anchor-Mom / Donch-Multi / Tri-Channel / Dual-Mom)
# ==============================================================================
#
# 2026-02-28 v5: Dual-Mom Pod 추가 (Incubation)
#   ACTIVE 전략 3개 + Incubation 1개:
#     - Pod 1: Anchor-Mom (12H, HEDGE_ONLY) — DOGE
#     - Pod 2: Donch-Multi (12H, FULL) — BTC
#     - Pod 3: Tri-Channel (12H, HEDGE_ONLY) — ETH, SOL
#     - Pod 4: Dual-Mom (12H, DISABLED) — BTC, ETH, AVAX, LINK [INCUBATION]
#
#   핵심 원칙:
#     - Hedge Mode: Pod별 독립 포지션 (positionSide LONG/SHORT 동시 보유)
#     - 에셋 분산 유지: ETH 중복 시 상관관계로 Sharpe 1.10→0.68 악화 확인
#       BTC가 개별 Sharpe 낮지만 분산 효과로 포트폴리오 기여도 더 높음
#     - Virtual Order Book: signal 시점 가상 포지션 (fill 미귀속)
#     - use_intrabar_trailing_stop: false (orchestrated_runner.py, EDA Parity B2)
#
#   v4→v5 변경:
#     - Pod 4 Dual-Mom 추가 (INCUBATION, 10% 자본)
#     - Hedge Mode에서 심볼 중복 허용 (BTC, ETH 공유)
#     - AVAX, LINK 신규 에셋으로 cross-sectional ranking 다양성 확보
#     - IntraPodAllocator DUAL_MOMENTUM: 절대 게이트 + 상대 ranking
#
#   백테스트 결과 (2024-2025, 2년):
#     Portfolio: Sharpe 1.10, CAGR 19.0%, MDD 16.34%
#     pod-anchor-mom: +74.2%, Sharpe 1.41
#     pod-donch-multi: +9.4%, Sharpe 0.53
#     pod-tri-channel: +28.7%, Sharpe 1.14
#
# Surveillance:
#   - 주간 시장 스캔으로 유동성 기준 에셋 자동 선별
#   - symbols는 부팅 시 보장되는 seed 심볼 (surveillance가 런타임에 추가)
#   - 탈락 에셋은 AssetSelector permanently_excluded 처리
#   - Hedge Mode: 동일 심볼이 여러 Pod에 배정 가능 (분산 효과 확인 후 결정)
#   - pinned_symbols: true → surveillance 심볼 추가/제거 차단 (config symbols만 사용)
#     온체인 전략 등 특정 에셋 전용 데이터 의존 시 활용
#
# 배포 전 필수 검증:
#   1. uv run mcbot orchestrate backtest config/orchestrator-live.yaml --report
#   2. uv run mcbot orchestrate paper config/orchestrator-live.yaml -V
#   3. Paper 24h+ 안정성 확인 후 Live 전환
#
# CLI:
#   Paper : uv run mcbot orchestrate paper config/orchestrator-live.yaml -V
#   Live  : uv run mcbot orchestrate live  config/orchestrator-live.yaml -V
# ==============================================================================

backtest:
  timeframe: "12H"
  start: "2024-01-01"
  end: "2025-12-31"
  capital: 10000.0

orchestrator:
  # ── Netting ────────────────────────────────────────────────
  netting_mode: hedge                   # Pod별 독립 포지션 (넷팅 없음)

  # ── Allocation ──────────────────────────────────────────────
  allocation_method: risk_parity         # Spinu(2013) 리스크 기여도 균등 배분
  kelly_fraction: 0.25
  kelly_confidence_ramp: 180

  # ── Volatility Targeting Overlay ──────────────────────────
  vol_target_enabled: true
  vol_target_annual: 0.15                # 15% 연간 목표 변동성
  vol_target_lookback: 60                # 60일 lookback
  vol_target_floor: 0.10                 # 최소 10% 투자
  vol_target_cap: 1.5                    # 최대 150% 투자

  # ── Regime Cash Buffer ────────────────────────────────────
  cash_buffer_enabled: true
  cash_buffer_adx_period: 14
  cash_buffer_trend_threshold: 25.0      # ADX ≥ 25 → 풀 투자
  cash_buffer_range_threshold: 20.0      # ADX ≤ 20 → 최대 현금
  cash_buffer_max: 0.40                  # 최대 40% 현금

  # ── Rebalance ───────────────────────────────────────────────
  rebalance_trigger: hybrid
  rebalance_calendar_days: 7
  rebalance_drift_threshold: 0.10

  # ── Portfolio Risk ──────────────────────────────────────────
  max_gross_leverage: 2.0
  max_portfolio_drawdown: 0.20
  max_portfolio_volatility: 0.25
  max_single_pod_risk_pct: 0.50        # 3-Pod → 각 50% 상한
  daily_loss_limit: 0.03
  cost_bps: 4.0                          # Taker: 0.04%
  maker_fee_bps: 2.0                     # Maker: 0.02% (Binance VIP0)

  # ── Correlation ─────────────────────────────────────────────
  correlation_lookback: 90
  correlation_stress_threshold: 0.70

  # ── Lifecycle: Graduation ───────────────────────────────────
  graduation:
    min_live_days: 30
    min_sharpe: 0.5
    max_drawdown: 0.20
    min_trade_count: 5
    min_calmar: 0.3
    max_backtest_live_gap: 0.30
    max_portfolio_correlation: 0.65

  # ── Lifecycle: Retirement ───────────────────────────────────
  retirement:
    max_drawdown_breach: 0.25
    consecutive_loss_months: 6
    rolling_sharpe_floor: 0.3
    probation_days: 30

  # ── Smart Execution ─────────────────────────────────────────
  smart_execution:
    enabled: true
    limit_timeout_seconds: 30            # Limit 대기 30초
    price_offset_bps: 1.0               # bid/ask 대비 1bp offset
    max_price_deviation_pct: 0.3         # 0.3% 이상 이탈 시 취소
    poll_interval_seconds: 2.0           # 2초 간격 상태 확인
    max_concurrent_limit_orders: 4
    fallback_to_market: true             # timeout 시 market fallback

  # ── Surveillance ────────────────────────────────────────────
  surveillance:
    enabled: true
    scan_interval_hours: 168            # 7일 주기
    min_24h_volume_usd: 50000000        # 최소 $50M 24h 거래대금
    min_listing_age_days: 90            # 최소 90일 상장
    exclude_stablecoins: true
    max_assets_per_pod: 8               # Pod당 최대 8 에셋
    max_total_assets: 20

  # ── Pods ────────────────────────────────────────────────────
  #
  # 에셋 분산: Pod 1-3 비중복, Pod 4(Incubation)은 Hedge Mode 중복 허용
  #   anchor-mom: DOGE  |  donch-multi: BTC  |  tri-channel: ETH, SOL
  #   dual-mom: BTC, ETH, AVAX, LINK (cross-sectional ranking용)
  #
  pods:
    # ────────────────────────────────────────────────────────
    # Pod 1: Anchor-Mom — Anchored Momentum (12H, HEDGE_ONLY)
    # P7 PASS | Sharpe 1.36 (DOGE best)
    # 심리적 앵커링: 고점 근접도 + 모멘텀 방향
    # Seed 에셋: DOGE — Sharpe 1.36
    # ────────────────────────────────────────────────────────
    - pod_id: pod-anchor-mom
      strategy_name: anchor-mom
      strategy_params:
        nearness_lookback: 29
        mom_lookback: 51
        strong_nearness: 0.9692
        weak_nearness: 0.8555
        short_nearness: 0.5293
        vol_target: 0.35
        vol_window: 12
        min_volatility: 0.05
        annualization_factor: 730.0
        atr_period: 22
        short_mode: 1                    # HEDGE_ONLY (원래 설계)
        hedge_threshold: -0.07
        hedge_strength_ratio: 0.8
      symbols:
        - DOGE/USDT
      timeframe: "12H"
      initial_fraction: 0.25
      max_fraction: 0.50
      min_fraction: 0.15
      max_drawdown: 0.20
      drawdown_warning: 0.15
      max_leverage: 2.0
      max_assets: 8
      system_stop_loss: 0.10
      use_trailing_stop: true
      trailing_stop_atr_multiplier: 3.0
      rebalance_threshold: 0.10
      asset_selector:
        enabled: true
        hard_exclude_sharpe: -1.0        # Sharpe < -1.0 즉시 제외
        hard_exclude_drawdown: 0.25      # DD > 25% 즉시 제외
        min_exclusion_bars: 30           # 최소 30봉(15일) cooldown
        min_active_assets: 0             # 전멸 허용 → Pod retirement 트리거

    # ────────────────────────────────────────────────────────
    # Pod 2: Donch-Multi — Donchian Multi-Scale (12H, FULL)
    # P7 PASS | Sharpe 1.61(VBT)/1.45(EDA) | ETH best
    # 3-scale Donchian breakout 앙상블 (시간축 다양성)
    # P5 최적화 파라미터 사용 (5/5 파라미터 100% 고원)
    # Seed 에셋: BTC (ETH 중복 시 포트폴리오 Sharpe 0.68로 악화)
    # ────────────────────────────────────────────────────────
    - pod_id: pod-donch-multi
      strategy_name: donch-multi
      strategy_params:
        lookback_short: 40
        lookback_mid: 74
        lookback_long: 157
        entry_threshold: 0.378
        vol_target: 0.35
        vol_window: 16
        min_volatility: 0.05
        annualization_factor: 730.0
        short_mode: 2                    # FULL (원래 설계)
        hedge_threshold: -0.07
        hedge_strength_ratio: 0.8
      symbols:
        - BTC/USDT
      timeframe: "12H"
      initial_fraction: 0.25
      max_fraction: 0.50
      min_fraction: 0.15
      max_drawdown: 0.20
      drawdown_warning: 0.15
      max_leverage: 2.0
      max_assets: 8
      system_stop_loss: 0.10
      use_trailing_stop: true
      trailing_stop_atr_multiplier: 3.0
      rebalance_threshold: 0.10
      asset_selector:
        enabled: true
        hard_exclude_sharpe: -1.0
        hard_exclude_drawdown: 0.25
        min_exclusion_bars: 30
        min_active_assets: 0

    # ────────────────────────────────────────────────────────
    # Pod 3: Tri-Channel — Triple-Channel Multi-Scale (12H, HEDGE_ONLY)
    # P7 PASS | Sharpe 2.17(VBT)/1.99(EDA) | ETH best
    # 3채널(DC/KC/BB) × 3스케일(20/60/150) 앙상블 (측정 직교성)
    # 기본 파라미터 사용 (P5A 최적화보다 OOS 강건)
    # Seed 에셋: ETH(1.28) SOL(1.25)
    # ────────────────────────────────────────────────────────
    - pod_id: pod-tri-channel
      strategy_name: tri-channel-trend
      strategy_params:
        scale_short: 20
        scale_mid: 60
        scale_long: 150
        bb_std_dev: 2.0
        keltner_multiplier: 1.5
        entry_threshold: 0.22
        vol_target: 0.35
        vol_window: 30
        min_volatility: 0.05
        annualization_factor: 730.0
        short_mode: 1                    # HEDGE_ONLY (원래 설계)
      symbols:
        - ETH/USDT
        - SOL/USDT
      timeframe: "12H"
      initial_fraction: 0.25
      max_fraction: 0.50
      min_fraction: 0.15
      max_drawdown: 0.20
      drawdown_warning: 0.15
      max_leverage: 2.0
      max_assets: 8
      system_stop_loss: 0.10
      use_trailing_stop: true
      trailing_stop_atr_multiplier: 3.0
      rebalance_threshold: 0.10
      asset_selector:
        enabled: true
        hard_exclude_sharpe: -1.0
        hard_exclude_drawdown: 0.25
        min_exclusion_bars: 30
        min_active_assets: 0

    # ────────────────────────────────────────────────────────
    # Pod 4: Dual-Mom — Dual Momentum XSMOM (12H, DISABLED)
    # INCUBATION | Pipeline 미검증 (P1 PENDING)
    # 절대 게이트(폭락 시 현금 대피) + 상대 ranking(승자 overweight)
    # Cross-sectional: 4심볼 중 top 50%(2개) EW 배분
    # Hedge Mode: BTC/ETH 중복 허용 (Pod별 독립 포지션)
    # ────────────────────────────────────────────────────────
    - pod_id: pod-dual-mom
      strategy_name: dual-mom
      strategy_params:
        lookback: 42
        vol_window: 30
        vol_target: 0.35
        min_volatility: 0.05
        annualization_factor: 730.0
        short_mode: 0                    # DISABLED (Long-Only)
      symbols:
        - BTC/USDT
        - ETH/USDT
        - AVAX/USDT
        - LINK/USDT
      timeframe: "12H"
      initial_fraction: 0.25
      max_fraction: 0.25
      min_fraction: 0.05
      max_drawdown: 0.20
      drawdown_warning: 0.15
      max_leverage: 1.0                  # Long-Only → 레버리지 1x
      max_assets: 8
      system_stop_loss: 0.10
      use_trailing_stop: true
      trailing_stop_atr_multiplier: 3.0
      rebalance_threshold: 0.10
      asset_allocation:
        method: dual_momentum
        rebalance_bars: 1                # 매 bar 리밸런싱
        mom_lookback: 42                 # 전략 lookback과 동기화
        top_pct: 0.50                    # 상위 50% (4심볼 중 2개)
        abs_mom_threshold: 0.0           # median < 0 → 현금 대피
        exposure_floor: 0.0              # 전체 음수 시 exposure=0
        vol_lookback: 60
        min_weight: 0.0                  # bottom 심볼 weight=0 허용
        max_weight: 1.0                  # top 심볼 weight=0.5 (EW)
      asset_selector:
        enabled: true
        hard_exclude_sharpe: -1.0
        hard_exclude_drawdown: 0.25
        min_exclusion_bars: 30
        min_active_assets: 0
      pinned_symbols: false              # surveillance 동적 심볼 추가 허용 (max 8)
