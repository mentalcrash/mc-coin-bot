# VWAP-Channel 12H Optimized — ADA/USDT
# band_multiplier=2.5, entry_threshold=0.5, vol_target=0.35

backtest:
  symbols:
    - ADA/USDT
  timeframe: "12H"
  start: "2020-01-01"
  end: "2026-01-01"
  capital: 100000.0

strategy:
  name: vwap-channel-12h
  params:
    scale_short: 20
    scale_mid: 60
    scale_long: 150
    band_multiplier: 2.5
    entry_threshold: 0.5
    vol_target: 0.35
    vol_window: 30
    min_volatility: 0.05
    annualization_factor: 730.0
    short_mode: 2
    hedge_threshold: -0.07
    hedge_strength_ratio: 0.8

portfolio:
  max_leverage_cap: 2.0
  rebalance_threshold: 0.10
  system_stop_loss: 0.10
  use_trailing_stop: true
  trailing_stop_atr_multiplier: 3.0
  use_intrabar_trailing_stop: false
  cost_model:
    maker_fee: 0.0002
    taker_fee: 0.0004
    slippage: 0.0005
    funding_rate_8h: 0.0001
    market_impact: 0.0002
