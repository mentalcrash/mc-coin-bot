# Triple-Channel Trend — MDD 분석 (전체 기간, DISABLED)
backtest:
  symbols:
    - ETH/USDT
  timeframe: "12H"
  start: "2020-01-01"
  end: "2025-12-31"
  capital: 100000.0

strategy:
  name: tri-channel-trend
  params:
    scale_short: 20
    scale_mid: 60
    scale_long: 150
    bb_std_dev: 2.0
    keltner_multiplier: 1.5
    entry_threshold: 0.22
    vol_window: 30
    vol_target: 0.35
    short_mode: 0
    annualization_factor: 730.0

portfolio:
  max_leverage_cap: 2.0
  rebalance_threshold: 0.10
  system_stop_loss: 0.10
  use_trailing_stop: true
  trailing_stop_atr_multiplier: 3.0
  use_intrabar_trailing_stop: false
  cost_model:
    maker_fee: 0.0002
    taker_fee: 0.0004
    slippage: 0.0005
    funding_rate_8h: 0.0001
    market_impact: 0.0002
